kind: source
name: error-kb-alloydb
type: postgres
host: ${ALLOYDB_PUBLIC_IP}
port: 5432
database: ${DATABASE_NAME}
user: ${DB_USER}
password: ${DB_PASSWORD}
---
kind: tool
name: search-similar-errors
type: postgres-sql
source: error-kb-alloydb
description: >-
  Search the error knowledge bank for past errors that are semantically
  similar to the given error text. Returns the top matching cases across
  all projects with their fixes and confidence scores.
parameters:
  - name: error_text
    type: string
    description: The raw error message combined with a short summary and GCP service name.
  - name: match_limit
    type: integer
    description: Maximum number of results to return. Default 5.
statement: |
  SELECT
    case_ref,
    project_id,
    error_message,
    error_summary,
    gcp_service,
    severity,
    status,
    root_cause,
    suggested_fixes,
    confirmed_fix,
    fix_source,
    overall_confidence,
    1 - (embedding <=> embedding('text-embedding-005', $1)::vector) AS similarity_score,
    created_at,
    resolved_at
  FROM error_knowledge_bank
  WHERE status = 'resolved'
    AND confirmed_fix IS NOT NULL
    AND 1 - (embedding <=> embedding('text-embedding-005', $1)::vector) >= 0.85
  ORDER BY embedding <=> embedding('text-embedding-005', $1)::vector
  LIMIT $2;
---
kind: tool
name: deposit-fix
type: postgres-sql
source: error-kb-alloydb
description: >-
  Record a confirmed fix for an existing case in the error knowledge bank.
  Call this after an engineer confirms that a suggested fix resolved their issue.
  Pass the case reference exactly as shown in the diagnostic report (e.g. EL-20260413-00001).
parameters:
  - name: case_ref
    type: string
    description: The case reference of the case to update (e.g. EL-20260413-00001).
  - name: confirmed_fix
    type: string
    description: Description of the fix that actually resolved the issue.
  - name: fix_source
    type: string
    description: "Origin of the fix: gcp_docs, community, or internal."
statement: |
  UPDATE error_knowledge_bank
  SET
    confirmed_fix = $2,
    fix_source = $3,
    status = 'resolved',
    overall_confidence = 1.0,
    resolved_at = NOW(),
    embedding = embedding('text-embedding-005',
                error_summary || ' ' || $2)::vector
  WHERE case_ref = $1
  RETURNING case_ref, project_id, gcp_service, status, confirmed_fix, overall_confidence, resolved_at;
---
kind: tool
name: get-open-cases
type: postgres-sql
source: error-kb-alloydb
description: >-
  Retrieve unresolved cases from the error knowledge bank.
  Pass a GCP project ID to filter to your team's cases, or 'all' to see every open case across all projects.
  Returns cases ordered by severity and creation date.
parameters:
  - name: project_id
    type: string
    description: GCP project ID to filter by (e.g. my-project-123), or 'all' for all projects.
statement: |
  SELECT
    case_ref,
    project_id,
    error_message,
    error_summary,
    gcp_service,
    severity,
    suggested_fixes,
    overall_confidence,
    created_at
  FROM error_knowledge_bank
  WHERE status = 'open'
    AND ($1 = 'all' OR project_id = $1)
  ORDER BY
    CASE severity
      WHEN 'critical' THEN 1
      WHEN 'high' THEN 2
      WHEN 'medium' THEN 3
      WHEN 'low' THEN 4
    END,
    created_at DESC;
---
kind: tool
name: get-case-by-id
type: postgres-sql
source: error-kb-alloydb
description: >-
  Retrieve a single case from the error knowledge bank by its case reference.
  Use this to look up full case details including suggested fixes before closing a case.
parameters:
  - name: case_ref
    type: string
    description: The case reference to retrieve (e.g. EL-20260413-00001).
statement: |
  SELECT
    case_ref,
    project_id,
    error_message,
    error_summary,
    gcp_service,
    severity,
    status,
    root_cause,
    suggested_fixes,
    confirmed_fix,
    fix_source,
    overall_confidence,
    created_at,
    resolved_at
  FROM error_knowledge_bank
  WHERE case_ref = $1;
---
kind: tool
name: record-new-error
type: postgres-sql
source: error-kb-alloydb
description: >-
  Record a newly triaged GCP error into the error knowledge bank when no
  confident match was found in the existing knowledge base (similarity < 0.85).
  Creates an open case with the error details and suggested fixes from the
  MAS triage pipeline. The case remains open until an engineer confirms
  which fix resolved it via deposit-fix.
parameters:
  - name: error_message
    type: string
    description: The raw error message exactly as provided by the developer.
  - name: error_summary
    type: string
    description: Normalised one-sentence summary of the error from signal_extractor_agent.
  - name: gcp_service
    type: string
    description: Primary GCP service identified from error_triage_result.
  - name: severity
    type: string
    description: "Severity level: low, medium, high, or critical."
  - name: root_cause
    type: string
    description: Root cause explanation from synthesis_result.
  - name: suggested_fixes
    type: string
    description: Full synthesis_result as a JSON string including ranked fixes and confidence scores.
  - name: overall_confidence
    type: string
    description: Overall confidence score from synthesis_result as a decimal string (e.g. "0.85").
  - name: project_id
    type: string
    description: GCP project ID of the team reporting this error (e.g. my-project-123).
statement: |
  INSERT INTO error_knowledge_bank (
    error_message,
    error_summary,
    gcp_service,
    severity,
    status,
    root_cause,
    suggested_fixes,
    overall_confidence,
    project_id,
    embedding
  ) VALUES (
    $1,
    $2,
    $3,
    $4,
    'open',
    $5,
    $6::jsonb,
    $7::float,
    $8,
    embedding('text-embedding-005', $2 || ' ' || $3)::vector
  )
  RETURNING
    case_ref,
    project_id,
    gcp_service,
    severity,
    status,
    overall_confidence,
    created_at;
---
kind: tool
name: get-kb-stats
type: postgres-sql
source: error-kb-alloydb
description: >-
  Returns a summary count of resolved and open cases in the error knowledge bank.
  Pass a GCP project ID to filter to your team's cases, or 'all' for totals across all projects.
parameters:
  - name: project_id
    type: string
    description: GCP project ID to filter by, or 'all' for all projects.
statement: |
  SELECT
    COUNT(*) FILTER (WHERE status = 'resolved') AS resolved_cases,
    COUNT(*) FILTER (WHERE status = 'open')     AS open_cases
  FROM error_knowledge_bank
  WHERE ($1 = 'all' OR project_id = $1);
---
kind: toolset
name: error-kb-toolbox
tools:
  - search-similar-errors
  - deposit-fix
  - get-open-cases
  - get-case-by-id
  - record-new-error
  - get-kb-stats
